apiVersion: apps/v1
kind: Deployment
metadata:
  name: argocd-repo-server
  namespace: argocd
spec:
  template:
    spec:
      imagePullSecrets:
        - name: harbor-secret

      volumes:
        # 🔹 CMP Plugin Config
        - name: timoni-cmp-config
          configMap:
            name: timoni-cmp-config

        # 🔹 Shared dirs (IMPORTANT: match ArgoCD defaults)
        - name: cmp-tmp
          emptyDir: {}

        - name: custom-tools
          emptyDir: {}

      initContainers:
        # 🔹 Install timoni binary
        - name: download-timoni
          image: demo.goharbor.io/creative-studio/timoni-cmp:latest
          command: ["sh", "-c"]
          args:
            - cp /usr/local/bin/timoni /custom-tools/timoni && chmod +x /custom-tools/timoni
          volumeMounts:
            - name: custom-tools
              mountPath: /custom-tools

      containers:
        # ✅ EXISTING repo-server (IMPORTANT: include image)
        - name: repo-server
          image: quay.io/argoproj/argocd:v3.3.4
          volumeMounts:
            - name: timoni-cmp-config
              mountPath: /home/argocd/cmp-server/config/plugin.yaml
              subPath: plugin.yaml

            - name: cmp-tmp
              mountPath: /tmp

            - name: custom-tools
              mountPath: /usr/local/bin/timoni
              subPath: timoni

        # ✅ CMP SIDECAR (CORRECT)
        - name: timoni-cmp
          image: demo.goharbor.io/creative-studio/timoni-cmp:latest
          command: ["/var/run/argocd/argocd-cmp-server"]

          securityContext:
            runAsUser: 999

          volumeMounts:
            - name: timoni-cmp-config
              mountPath: /home/argocd/cmp-server/config/plugin.yaml
              subPath: plugin.yaml

            - name: cmp-tmp
              mountPath: /tmp

            - name: custom-tools
              mountPath: /usr/local/bin/timoni
              subPath: timoni
