          sed -i 's|image:.*|image: "'"${IMAGE_DIGEST}"'"|' environments/stage/values.cue
          sed -i 's|digest:.*|digest: "'"${TARGET_DIGEST}"'"|' environments/stage/values.cue

      - if: steps.check.outputs.skip == 'false'
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add environments/stage/values.cue
          git commit -m "chore(stage): promote image ${IMAGE_DIGEST}"
          git push origin main

  deploy-prod:
    runs-on: self-hosted
    needs: deploy-stage
    environment: prod

    steps:
      - uses: actions/checkout@v4

      - run: echo "IMAGE_DIGEST=${{ github.event.client_payload.image_digest }}" >> $GITHUB_ENV

      - run: |
          git fetch origin main
          git checkout main
          git reset --hard origin/main

      - id: check
        run: |
          FILE="modules/creative-studio/values.cue"
          CURRENT_IMAGE="$(awk '/^[[:space:]]*image:/{gsub(/"/,"",$2); print $2; exit}' "$FILE")"
          CURRENT_DIGEST="$(awk '/^[[:space:]]*digest:/{gsub(/"/,"",$2); print $2; exit}' "$FILE")"
          TARGET_DIGEST="${IMAGE_DIGEST#*@}"

          if [ "$CURRENT_IMAGE" = "$IMAGE_DIGEST" ] && [ "$CURRENT_DIGEST" = "$TARGET_DIGEST" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - if: steps.check.outputs.skip == 'false'
        run: |
          TARGET_DIGEST="${IMAGE_DIGEST#*@}"
          sed -i 's|image:.*|image: "'"${IMAGE_DIGEST}"'"|' modules/creative-studio/values.cue
          sed -i 's|digest:.*|digest: "'"${TARGET_DIGEST}"'"|' modules/creative-studio/values.cue

      - if: steps.check.outputs.skip == 'false'
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add modules/creative-studio/values.cue
          git commit -m "chore(prod): promote image ${IMAGE_DIGEST}"
