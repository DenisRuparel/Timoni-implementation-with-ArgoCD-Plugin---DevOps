name: Timoni CD

on:
  repository_dispatch:
    types: [update-image]

permissions:
  contents: write

env:
  IMAGE_DIGEST: ${{ github.event.client_payload.image_digest }}
  REGISTRY: ${{ github.event.client_payload.registry }}

jobs:
  deploy-beta:
    runs-on: self-hosted
    environment: beta

    steps:
      - uses: actions/checkout@v4

      - name: Checkout latest main
        run: |
          git fetch origin main
          git checkout main
          git reset --hard origin/main

      - name: Update beta digest
        run: |
          FILE="environments/beta/values.cue"
          FILE_BETA="modules/creative-studio/beta/beta-values.cue"
          TARGET_DIGEST="${IMAGE_DIGEST#*@}"
          TARGET_REPOSITORY="${REGISTRY}/creative-studio/creative-studio"

          CURRENT_DIGEST=$(awk '
            /^[[:space:]]*digest:/ {
              gsub(/"/, "", $2)
              print $2
              exit
            }
          ' "$FILE")

          echo "Current digest: $CURRENT_DIGEST"
          echo "Target digest: $TARGET_DIGEST"

          if [ "$CURRENT_DIGEST" = "$TARGET_DIGEST" ]; then
            echo "No changes required"
            exit 0
          fi

          sed -i "s|^[[:space:]]*repository:.*|        repository: \"${TARGET_REPOSITORY}\"|" "$FILE"
          sed -i "s|^[[:space:]]*digest:.*|        digest: \"${TARGET_DIGEST}\"|" "$FILE"
          sed -i "s|^[[:space:]]*digest:.*|        digest: \"${TARGET_DIGEST}\"|" "$FILE_BETA"

      - name: Commit and push beta
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add environments/beta/values.cue

          if git diff --cached --quiet; then
            echo "Nothing to commit"
            exit 0
          fi

          git commit -m "chore(beta): promote image ${IMAGE_DIGEST}"
          git push origin main

  deploy-stage:
    runs-on: self-hosted
    needs: deploy-beta
    environment: stage

    steps:
      - uses: actions/checkout@v4

      - name: Checkout latest main
        run: |
          git fetch origin main
          git checkout main
          git reset --hard origin/main

      - name: Update stage digest
        run: |
          FILE="environments/stage/values.cue"
          FILE_STAGE="modules/creative-studio/stage/stage-values.cue"
          TARGET_DIGEST="${IMAGE_DIGEST#*@}"
          TARGET_REPOSITORY="${REGISTRY}/creative-studio/creative-studio"

          CURRENT_DIGEST=$(awk '
            /^[[:space:]]*digest:/ {
              gsub(/"/, "", $2)
              print $2
              exit
            }
          ' "$FILE")

          echo "Current digest: $CURRENT_DIGEST"
          echo "Target digest: $TARGET_DIGEST"

          if [ "$CURRENT_DIGEST" = "$TARGET_DIGEST" ]; then
            echo "No changes required"
            exit 0
          fi

          sed -i "s|^[[:space:]]*repository:.*|        repository: \"${TARGET_REPOSITORY}\"|" "$FILE"
          sed -i "s|^[[:space:]]*digest:.*|        digest: \"${TARGET_DIGEST}\"|" "$FILE"
          sed -i "s|^[[:space:]]*digest:.*|        digest: \"${TARGET_DIGEST}\"|" "$FILE_STAGE"

      - name: Commit and push stage
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add environments/stage/values.cue

          if git diff --cached --quiet; then
            echo "Nothing to commit"
            exit 0
          fi

          git commit -m "chore(stage): promote image ${IMAGE_DIGEST}"
          git push origin main

  deploy-prod:
    runs-on: self-hosted
    needs: deploy-stage
    environment: prod

    steps:
      - uses: actions/checkout@v4

      - name: Checkout latest main
        run: |
          git fetch origin main
          git checkout main
          git reset --hard origin/main

      - name: Update prod digest
        run: |
          FILE="modules/creative-studio/values.cue"
          TARGET_DIGEST="${IMAGE_DIGEST#*@}"
          TARGET_REPOSITORY="${REGISTRY}/creative-studio/creative-studio"

          CURRENT_DIGEST=$(awk '
            /^[[:space:]]*digest:/ {
              gsub(/"/, "", $2)
              print $2
              exit
            }
          ' "$FILE")

          echo "Current digest: $CURRENT_DIGEST"
          echo "Target digest: $TARGET_DIGEST"

          if [ "$CURRENT_DIGEST" = "$TARGET_DIGEST" ]; then
            echo "No changes required"
            exit 0
          fi

          sed -i "s|^[[:space:]]*repository:.*|        repository: \"${TARGET_REPOSITORY}\"|" "$FILE"
          sed -i "s|^[[:space:]]*digest:.*|        digest: \"${TARGET_DIGEST}\"|" "$FILE"

      - name: Commit and push prod
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add modules/creative-studio/values.cue

          if git diff --cached --quiet; then
            echo "Nothing to commit"
            exit 0
          fi

          git commit -m "chore(prod): promote image ${IMAGE_DIGEST}"
          git push origin main
