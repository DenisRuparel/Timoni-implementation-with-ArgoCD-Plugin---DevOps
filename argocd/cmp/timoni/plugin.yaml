apiVersion: argoproj.io/v1alpha1
kind: ConfigManagementPlugin
metadata:
  name: argo-cmp-timoni
spec:
  version: v1.0

  # This plugin renders the Timoni module in `modules/creative-studio`
  # using an environment-specific values file selected by ARGOCD_ENV.
  #
  # Expected Application source:
  #   spec.source.path: .
  #   spec.source.plugin.name: argo-cmp-timoni
  #   spec.source.plugin.env:
  #     - name: ARGOCD_ENV
  #       value: beta|stage|prod
  #
  # Optional overrides:
  #   APP_NAME: instance name (defaults to ARGOCD_APP_NAME)
  #   NAMESPACE: target namespace (defaults to ARGOCD_APP_NAMESPACE)
  #   VALUES_FILE: explicit .cue file path (overrides ARGOCD_ENV selection)

  init:
    command: ["/bin/sh", "-c"]
    args:
      - |
        set -euo pipefail
        test -d modules/creative-studio

  generate:
    command: ["/bin/sh", "-c"]
    args:
      - |
        set -euo pipefail

        APP_NAME="${APP_NAME:-${ARGOCD_APP_NAME:-creative-studio}}"
        NAMESPACE="${NAMESPACE:-${ARGOCD_APP_NAMESPACE:-default}}"

        if [ -n "${VALUES_FILE:-}" ]; then
          VALUES_PATH="${VALUES_FILE}"
        else
          case "${ARGOCD_ENV:-prod}" in
            beta)  VALUES_PATH="environments/beta/values.cue" ;;
            stage) VALUES_PATH="environments/stage/values.cue" ;;
            prod)  VALUES_PATH="modules/creative-studio/values.cue" ;;
            *)
              echo "Unsupported ARGOCD_ENV='${ARGOCD_ENV:-}' (expected beta|stage|prod)" 1>&2
              exit 1
              ;;
          esac
        fi

        if [ ! -f "${VALUES_PATH}" ]; then
          echo "Values file not found: ${VALUES_PATH}" 1>&2
          exit 1
        fi

        # Render Kubernetes YAML to stdout for Argo CD.
        /usr/local/bin/timoni build "${APP_NAME}" -n "${NAMESPACE}" "./modules/creative-studio" \
          --values "${VALUES_PATH}"
