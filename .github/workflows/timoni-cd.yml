name: Timoni CD

on:
  repository_dispatch:
    types: [update-image]

permissions:
  contents: write

jobs:
  # ─────────────────────────────────────────
  # BETA — auto deploys, no approval needed
  # ─────────────────────────────────────────
  deploy-beta:
    runs-on: self-hosted
    environment: beta

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set image digest
        run: echo "IMAGE_DIGEST=${{ github.event.client_payload.image_digest }}" >> $GITHUB_ENV

      - name: Sync repository
        run: |
          git fetch origin main
          git checkout main
          git reset --hard origin/main

      - name: Check if digest changed
        id: check
        run: |
          CURRENT=$(grep digest environments/beta/values.cue | awk '{print $2}' | tr -d '"')
          if [ "$CURRENT" = "$IMAGE_DIGEST" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "Digest unchanged — skipping"
          else
            echo "skip=false" >> $GITHUB_OUTPUT
            echo "Digest changed — updating"
          fi

      - name: Update environments/beta/values.cue
        if: steps.check.outputs.skip == 'false'
        run: |
          sed -i 's|digest:.*|digest: "'"${IMAGE_DIGEST}"'"|' \
            environments/beta/values.cue

      - name: Verify update
        if: steps.check.outputs.skip == 'false'
        run: |
          echo "---- UPDATED DIGEST ----"
          grep digest environments/beta/values.cue

      - name: Commit and push
        if: steps.check.outputs.skip == 'false'
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add environments/beta/values.cue
          git commit -m "chore(beta): promote image ${IMAGE_DIGEST}"
          git push origin main

  # ─────────────────────────────────────────
  # STAGE — waits for beta + manual approval
  # ─────────────────────────────────────────
  deploy-stage:
    runs-on: self-hosted
    needs: deploy-beta
    environment: stage

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set image digest
        run: echo "IMAGE_DIGEST=${{ github.event.client_payload.image_digest }}" >> $GITHUB_ENV

      - name: Sync repository
        run: |
          git fetch origin main
          git checkout main
          git reset --hard origin/main

      - name: Check if digest changed
        id: check
        run: |
          CURRENT=$(grep digest environments/stage/values.cue | awk '{print $2}' | tr -d '"')
          if [ "$CURRENT" = "$IMAGE_DIGEST" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "Digest unchanged — skipping"
          else
            echo "skip=false" >> $GITHUB_OUTPUT
            echo "Digest changed — updating"
          fi

      - name: Update environments/stage/values.cue
        if: steps.check.outputs.skip == 'false'
        run: |
          sed -i 's|digest:.*|digest: "'"${IMAGE_DIGEST}"'"|' \
            environments/stage/values.cue

      - name: Verify update
        if: steps.check.outputs.skip == 'false'
        run: |
          echo "---- UPDATED DIGEST ----"
          grep digest environments/stage/values.cue

      - name: Commit and push
        if: steps.check.outputs.skip == 'false'
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add environments/stage/values.cue
          git commit -m "chore(stage): promote image ${IMAGE_DIGEST}"
          git push origin main

  # ─────────────────────────────────────────
  # PROD — waits for stage + manual approval
  # ─────────────────────────────────────────
  deploy-prod:
    runs-on: self-hosted
    needs: deploy-stage
    environment: production

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set image digest
        run: echo "IMAGE_DIGEST=${{ github.event.client_payload.image_digest }}" >> $GITHUB_ENV

      - name: Sync repository
        run: |
          git fetch origin main
          git checkout main
          git reset --hard origin/main

      - name: Check if digest changed
        id: check
        run: |
          CURRENT=$(grep digest modules/creative-studio/values.cue | awk '{print $2}' | tr -d '"')
          if [ "$CURRENT" = "$IMAGE_DIGEST" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "Digest unchanged — skipping"
          else
            echo "skip=false" >> $GITHUB_OUTPUT
            echo "Digest changed — updating"
          fi

      - name: Update modules/creative-studio/values.cue
        if: steps.check.outputs.skip == 'false'
        run: |
          sed -i 's|digest:.*|digest: "'"${IMAGE_DIGEST}"'"|' \
            modules/creative-studio/values.cue

      - name: Verify update
        if: steps.check.outputs.skip == 'false'
        run: |
          echo "---- UPDATED DIGEST ----"
          grep digest modules/creative-studio/values.cue

      - name: Commit and push
        if: steps.check.outputs.skip == 'false'
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add modules/creative-studio/values.cue
          git commit -m "chore(prod): promote image ${IMAGE_DIGEST}"
          git push origin main
beta  → environments/beta/values.cue
stage → environments/stage/values.cue
prod  → modules/creative-studio/values.cue   ← different!
