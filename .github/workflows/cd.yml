name: Timoni CD

on:
  repository_dispatch:
    types: [update-image]

permissions:
  contents: write

jobs:
  update-and-deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Ensure Timoni is installed
        run: |
          if ! command -v timoni &> /dev/null
          then
            echo "Installing Timoni..."
            curl -sSL https://github.com/stefanprodan/timoni/releases/latest/download/timoni-linux-amd64.tar.gz | tar -xz
            sudo mv timoni /usr/local/bin/
          else
            echo "Timoni already installed"
            timoni version
          fi

      - name: Set image digest
        run: |
          echo "IMAGE_DIGEST=${{ github.event.client_payload.image_digest }}" >> $GITHUB_ENV
          
      - name: Sync repository
        run: |
          git fetch origin main
          git checkout main
          git reset --hard origin/main

      - name: Check if digest changed
        run: |
          CURRENT=$(grep digest modules/creative-studio/values.cue | awk '{print $2}' | tr -d '"')

          if [ "$CURRENT" = "$IMAGE_DIGEST" ]; then
            echo "Digest already up-to-date. Skipping pipeline."
            exit 0
          fi

      - name: Create manifest directory
        run: |
          mkdir -p deploy/manifests/prod

      - name: Update values.cue
        run: |
          sed -i "/digest:/c\        digest: \"${IMAGE_DIGEST}\"" modules/creative-studio/values.cue

      - name: Verify values.cue update
        run: |
          echo "----- UPDATED VALUES -----"
          grep digest modules/creative-studio/values.cue

      - name: Generate manifests
        run: |
          timoni build creative-studio ./modules/creative-studio \
            --values modules/creative-studio/values.cue \
            > deploy/manifests/prod/all.yaml

      - name: Debug manifest
        run: |
          echo "---- FILES ----"
          ls -R deploy || echo "deploy not found"
          echo "---- CONTENT ----"
          cat deploy/manifests/prod/all.yaml || echo "file missing"

      - name: Verify manifest image
        run: |
          echo "----- IMAGE IN MANIFEST -----"
          grep image deploy/manifests/prod/all.yaml || echo "No image found"

      - name: Commit and push changes
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add .

          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update image to ${IMAGE_DIGEST}"
            git push origin main
          fi
