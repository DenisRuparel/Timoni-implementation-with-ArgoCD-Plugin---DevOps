apiVersion: apps/v1
kind: Deployment
metadata:
  name: argocd-repo-server
  namespace: argocd
spec:
  template:
    spec:
      imagePullSecrets:
        - name: harbor-secret
      volumes:
        - name: timoni-cmp-config
          configMap:
            name: timoni-cmp-config
        - name: var-files
          emptyDir: {}
        - name: plugins
          emptyDir: {}
        - name: custom-tools
          emptyDir: {}
      initContainers:
        - name: download-timoni
          image: demo.goharbor.io/creative-studio/timoni-cmp:latest
          imagePullPolicy: Always
          command: [sh, -c]
          args:
            - cp /usr/local/bin/timoni /custom-tools/timoni && chmod +x /custom-tools/timoni
          volumeMounts:
            - name: custom-tools
              mountPath: /custom-tools
      containers:
        - name: argocd-repo-server
          image: quay.io/argoproj/argocd:v3.3.4
          volumeMounts:
            - name: var-files
              mountPath: /var/run/argocd
            - name: plugins
              mountPath: /home/argocd/cmp-server/plugins
            - name: custom-tools
              mountPath: /usr/local/bin/timoni
              subPath: timoni
        - name: timoni-cmp
          image: demo.goharbor.io/creative-studio/timoni-cmp:latest
          imagePullPolicy: Always
          command: [/var/run/argocd/argocd-cmp-server]
          securityContext:
            runAsNonRoot: true
            runAsUser: 999
          volumeMounts:
            - name: var-files
              mountPath: /var/run/argocd
            - name: plugins
              mountPath: /home/argocd/cmp-server/plugins
            - name: timoni-cmp-config
              mountPath: /home/argocd/cmp-server/config/plugin.yaml
              subPath: plugin.yaml
            - name: custom-tools
              mountPath: /usr/local/bin/timoni
              subPath: timoni
