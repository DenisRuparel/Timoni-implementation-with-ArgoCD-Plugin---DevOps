name: Timoni CD

on:
  repository_dispatch:
    types: [update-image]

permissions:
  contents: write

jobs:
  update-and-deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Ensure Timoni is installed
        run: |
          if ! command -v timoni &> /dev/null
          then
            echo "Installing Timoni..."
            curl -sSL https://github.com/stefanprodan/timoni/releases/latest/download/timoni-linux-amd64.tar.gz | tar -xz
            sudo mv timoni /usr/local/bin/
          else
            echo "Timoni already installed"
            timoni version
          fi

      - name: Set image digest
        run: |
          echo "IMAGE_DIGEST=${{ github.event.client_payload.image_digest }}" >> $GITHUB_ENV

      - name: Sync, Generate, Commit & Push
        run: |
          set -e

          git config user.name "github-actions"
          git config user.email "actions@github.com"

          # Retry mechanism (handles race conditions)
          for i in 1 2 3; do
            echo "Attempt $i..."

            # 1. Sync with remote FIRST
            git fetch origin main
            git checkout main
            git reset --hard origin/main

            # 2. Ensure directory exists
            mkdir -p deploy/manifests/prod

            # 3. Update digest in values.cue
            sed -i "s|digest: \".*\"|digest: \"${IMAGE_DIGEST}\"|" modules/creative-studio/values.cue

            # 4. Generate manifests using Timoni
            timoni build creative-studio ./modules/creative-studio \
              --values modules/creative-studio/values.cue \
              > deploy/manifests/prod/all.yaml

            # 5. Commit changes
            git add .
            git commit -m "Update image to ${IMAGE_DIGEST}" || echo "No changes to commit"

            # 6. Push changes
            if git push origin main; then
              echo "Push successful ✅"
              break
            else
              echo "Push failed, retrying..."
              sleep 2
            fi
          done
