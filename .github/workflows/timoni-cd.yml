name: Timoni CD

on:
  repository_dispatch:
    types: [update-image]

permissions:
  contents: write

jobs:
  deploy-beta:
    runs-on: self-hosted
    environment: beta

    steps:
      - uses: actions/checkout@v4

      - run: echo "IMAGE_DIGEST=${{ github.event.client_payload.image_digest }}" >> $GITHUB_ENV

      - run: |
          git fetch origin main
          git checkout main
          git reset --hard origin/main

      - id: check
        run: |
          CURRENT=$(grep image environments/beta/values.cue | awk '{print $2}' | tr -d '"')
          if [ "$CURRENT" = "$IMAGE_DIGEST" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - if: steps.check.outputs.skip == 'false'
        run: |
          sed -i 's|image:.*|image: "'"${IMAGE_DIGEST}"'"|' environments/beta/values.cue

      - if: steps.check.outputs.skip == 'false'
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add environments/beta/values.cue
          git commit -m "chore(beta): promote image ${IMAGE_DIGEST}"
          git push origin main

  deploy-stage:
    runs-on: self-hosted
    needs: deploy-beta
    environment: stage

    steps:
      - uses: actions/checkout@v4

      - run: echo "IMAGE_DIGEST=${{ github.event.client_payload.image_digest }}" >> $GITHUB_ENV

      - run: |
          git fetch origin main
          git checkout main
          git reset --hard origin/main

      - id: check
        run: |
          CURRENT=$(grep image environments/stage/values.cue | awk '{print $2}' | tr -d '"')
          if [ "$CURRENT" = "$IMAGE_DIGEST" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - if: steps.check.outputs.skip == 'false'
        run: |
          sed -i 's|image:.*|image: "'"${IMAGE_DIGEST}"'"|' environments/stage/values.cue

      - if: steps.check.outputs.skip == 'false'
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add environments/stage/values.cue
          git commit -m "chore(stage): promote image ${IMAGE_DIGEST}"
          git push origin main

  deploy-prod:
    runs-on: self-hosted
    needs: deploy-stage
    environment: production

    steps:
      - uses: actions/checkout@v4

      - run: echo "IMAGE_DIGEST=${{ github.event.client_payload.image_digest }}" >> $GITHUB_ENV

      - run: |
          git fetch origin main
          git checkout main
          git reset --hard origin/main

      - id: check
        run: |
          CURRENT=$(grep image modules/creative-studio/values.cue | awk '{print $2}' | tr -d '"')
          if [ "$CURRENT" = "$IMAGE_DIGEST" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - if: steps.check.outputs.skip == 'false'
        run: |
          sed -i 's|image:.*|image: "'"${IMAGE_DIGEST}"'"|' modules/creative-studio/values.cue

      - if: steps.check.outputs.skip == 'false'
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add modules/creative-studio/values.cue
          git commit -m "chore(prod): promote image ${IMAGE_DIGEST}"
          git push origin main
