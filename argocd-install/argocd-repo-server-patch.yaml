apiVersion: apps/v1
kind: Deployment
metadata:
  name: argocd-repo-server
  namespace: argocd
spec:
  template:
    spec:
      imagePullSecrets:
        - name: harbor-secret
      serviceAccountName: argocd-repo-server
      automountServiceAccountToken: true
      volumes:
        - name: timoni-cmp-config
          configMap:
            name: timoni-cmp-config
        - name: var-files
          emptyDir: {}
        - name: plugins
          emptyDir: {}
        - name: custom-tools
          emptyDir: {}
        - name: tmp
          emptyDir: {}
        - name: argocd-repo-server-tls
          secret:
            secretName: argocd-repo-server-tls
            optional: true
        - name: argocd-cmp-server-tls
          secret:
            secretName: argocd-cmp-server-tls
            optional: true
      initContainers:
        - name: download-timoni
          image: demo.goharbor.io/creative-studio/timoni-cmp:latest
          imagePullPolicy: Always
          command: [sh, -c]
          args:
            - cp /usr/local/bin/timoni /custom-tools/timoni && chmod +x /custom-tools/timoni
          volumeMounts:
            - name: custom-tools
              mountPath: /custom-tools
      containers:
        - name: repo-server                          # ✅ correct container name
          image: quay.io/argoproj/argocd:v3.3.4     # ✅ correct version
          imagePullPolicy: IfNotPresent
          args:
            - /usr/local/bin/argocd-repo-server
          env:
            - name: ARGOCD_RECONCILIATION_TIMEOUT
              valueFrom:
                configMapKeyRef:
                  name: argocd-cm
                  key: timeout.reconciliation
                  optional: true
            - name: ARGOCD_REPO_SERVER_LOGFORMAT
              valueFrom:
                configMapKeyRef:
                  name: argocd-cmd-params-cm
                  key: reposerver.log.format
                  optional: true
            - name: ARGOCD_REPO_SERVER_LOGLEVEL
              valueFrom:
                configMapKeyRef:
                  name: argocd-cmd-params-cm
                  key: reposerver.log.level
                  optional: true
          ports:
            - containerPort: 8081
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz?full=true
              port: 8084
            initialDelaySeconds: 30
            periodSeconds: 30
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8084
            initialDelaySeconds: 5
            periodSeconds: 10
          volumeMounts:
            - name: var-files
              mountPath: /var/run/argocd
            - name: plugins
              mountPath: /home/argocd/cmp-server/plugins
            - name: custom-tools
              mountPath: /usr/local/bin/timoni
              subPath: timoni
            - name: tmp
              mountPath: /tmp
            - name: argocd-repo-server-tls
              mountPath: /app/config/reposerver/tls
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
        - name: timoni-cmp                           # ✅ sidecar container
          image: demo.goharbor.io/creative-studio/timoni-cmp:latest
          imagePullPolicy: Always
          command: [/var/run/argocd/argocd-cmp-server]
          securityContext:
            runAsNonRoot: true
            runAsUser: 999
          volumeMounts:
            - name: var-files
              mountPath: /var/run/argocd
            - name: plugins
              mountPath: /home/argocd/cmp-server/plugins
            - name: timoni-cmp-config
              mountPath: /home/argocd/cmp-server/config/plugin.yaml
              subPath: plugin.yaml
            - name: custom-tools
              mountPath: /usr/local/bin/timoni
              subPath: timoni
            - name: tmp
              mountPath: /tmp
