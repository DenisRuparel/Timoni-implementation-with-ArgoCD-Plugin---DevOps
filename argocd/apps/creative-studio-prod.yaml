apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: creative-studio-prod
  namespace: argocd
spec:
  project: creative-studio

  source:
    repoURL: https://github.com/DenisRuparel/Timoni-implementation-with-ArgoCD-Plugin---DevOps
    targetRevision: main
    path: .

    plugin:
      name: argo-cmp-timoni
      env:
        - name: ARGOCD_ENV
          value: prod

  destination:
    server: https://10.160.0.4:6443
    namespace: creative-studio-prod

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
