apiVersion: v1
kind: ConfigMap
metadata:
  name: timoni-cmp-config
  namespace: argocd
data:
  plugin.yaml: |
    apiVersion: argoproj.io/v1alpha1
    kind: ConfigManagementPlugin
    metadata:
      name: timoni
    spec:
      version: v1.0
      discover:
        find:
          glob: "**/values.cue"
      generate:
        command: [sh, -c]
        args:
          - |
            set -e

            ENV=$(echo "${ARGOCD_APP_NAME}" | awk -F'-' '{print $NF}')

            REPO_ROOT="${ARGOCD_ENV_REPO_ROOT}"
            MODULE_PATH="${REPO_ROOT}/modules/creative-studio"

            echo "App:       ${ARGOCD_APP_NAME}"
            echo "Namespace: ${ARGOCD_APP_NAMESPACE}"
            echo "Env:       ${ENV}"

            if [ "${ENV}" = "prod" ]; then
              echo "Prod — using modules/creative-studio/values.cue"
              timoni build creative-studio \
                "${MODULE_PATH}" \
                --values "${MODULE_PATH}/values.cue" \
                --namespace "${ARGOCD_APP_NAMESPACE}"

            elif [ "${ENV}" = "beta" ]; then
              echo "Beta — using environments/beta/values.cue"
              timoni build creative-studio \
                "${MODULE_PATH}" \
                --values "${REPO_ROOT}/environments/beta/values.cue" \
                --namespace "${ARGOCD_APP_NAMESPACE}"

            elif [ "${ENV}" = "stage" ]; then
              echo "Stage — using environments/stage/values.cue"
              timoni build creative-studio \
                "${MODULE_PATH}" \
                --values "${REPO_ROOT}/environments/stage/values.cue" \
                --namespace "${ARGOCD_APP_NAMESPACE}"

            else
              echo "Unknown environment: ${ENV}"
              exit 1
            fi
