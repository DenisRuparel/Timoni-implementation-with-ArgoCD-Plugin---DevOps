name: Timoni CD

on:
  repository_dispatch:
    types: [update-image]

permissions:
  contents: write

jobs:
  update-and-deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Ensure Timoni is installed
        run: |
          if ! command -v timoni &> /dev/null
          then
            echo "Installing Timoni..."
            curl -sSL https://github.com/stefanprodan/timoni/releases/latest/download/timoni-linux-amd64.tar.gz | tar -xz
            sudo mv timoni /usr/local/bin/
          else
            echo "Timoni already installed"
            timoni version
          fi

      - name: Set image digest
        run: |
          echo "IMAGE_DIGEST=${{ github.event.client_payload.image_digest }}" >> $GITHUB_ENV

      - name: Commit changes
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add .
          git commit -m "Update image to ${IMAGE_DIGEST}" || echo "No changes to commit"
          git push
